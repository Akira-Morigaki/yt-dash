<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1, viewport-fit=cover">
  <title>AKIRA.M — Dashboard</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Bebas+Neue&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="style.css?v=9">
  <script src="data.js?v=2"></script>

</head>
<body>
  <div class="grain" aria-hidden="true"></div>
  <div class="vignette" aria-hidden="true"></div>
  <div class="letterbox letterbox--top" aria-hidden="true"></div>
  <div class="letterbox letterbox--bottom" aria-hidden="true"></div>

  <main class="layout">
    <section class="col-left">
      <div class="sub-inner">
        <p class="channel-name">AKIRA.M</p>
        <p class="sub-label">SUBSCRIBERS</p>
        <p class="sub-count" id="subCount">—</p>
        <p class="sub-delta" id="subDelta"></p>
        <svg class="sparkline" id="sparkline" viewBox="0 0 200 40" preserveAspectRatio="none" aria-hidden="true">
          <defs>
            <linearGradient id="sparkGrad" x1="0" y1="0" x2="0" y2="1">
              <stop offset="0%" stop-color="#FF0000" stop-opacity="0.25"/>
              <stop offset="100%" stop-color="#FF0000" stop-opacity="0"/>
            </linearGradient>
          </defs>
          <path id="sparkFill" fill="url(#sparkGrad)" stroke="none" d=""/>
          <polyline id="sparkLine" fill="none" stroke="#FF0000" stroke-width="1.2" stroke-linejoin="round" stroke-linecap="round" points=""/>
        </svg>
        <p class="updated-at" id="updatedAt"></p>
      </div>
      <div class="red-line" aria-hidden="true"></div>
    </section>

    <div class="col-sep" aria-hidden="true"></div>

    <section class="col-right">
      <div class="video-grid" id="videoGrid"></div>
    </section>
  </main>

  <footer class="live-bar">
    <span class="live-dot" aria-hidden="true"></span>
    <span class="live-label">LIVE</span>
    <span class="live-time" id="liveTime"></span>
    <span class="live-sep" aria-hidden="true"></span>
    <span class="live-version">v9</span>
  </footer>

  <script src="app.js?v=8"></script>
</body>
</html>
